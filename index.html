<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赛博电台 - Cyber Radio</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-cyan: #00f5ff;
      --neon-magenta: #ff00ff;
      --neon-yellow: #ffff00;
      --neon-green: #00ff41;
      --neon-orange: #ff6600;
      --neon-red: #ff0040;
      --dark-bg: #0a0a0f;
      --dark-surface: #12121a;
      --dark-card: #1a1a25;
      --text-primary: #ffffff;
      --text-secondary: #8888aa;
      --texture-intensity: 0;
      --wear-level: 0;
      --metal-shine: 0;
      --dust-opacity: 0;
      --scratch-density: 0;
      
      --primary-rgb: 0, 245, 255;
      --secondary-rgb: 255, 0, 255;
      --accent-rgb: 255, 102, 0;
      
      --primary-03: rgba(0, 245, 255, 0.03);
      --primary-05: rgba(0, 245, 255, 0.05);
      --primary-08: rgba(0, 245, 255, 0.08);
      --primary-1: rgba(0, 245, 255, 0.1);
      --primary-12: rgba(0, 245, 255, 0.12);
      --primary-15: rgba(0, 245, 255, 0.15);
      --primary-2: rgba(0, 245, 255, 0.2);
      --primary-3: rgba(0, 245, 255, 0.3);
      --primary-4: rgba(0, 245, 255, 0.4);
      --primary-5: rgba(0, 245, 255, 0.5);
      
      --secondary-03: rgba(255, 0, 255, 0.03);
      --secondary-05: rgba(255, 0, 255, 0.05);
      --secondary-08: rgba(255, 0, 255, 0.08);
      --secondary-1: rgba(255, 0, 255, 0.1);
      --secondary-12: rgba(255, 0, 255, 0.12);
      --secondary-15: rgba(255, 0, 255, 0.15);
      --secondary-2: rgba(255, 0, 255, 0.2);
      --secondary-3: rgba(255, 0, 255, 0.3);
      
      --glow-cyan: rgba(0, 245, 255, 0.3);
      --glow-magenta: rgba(255, 0, 255, 0.25);
      --glow-accent: rgba(255, 255, 0, 0.15);
      
      --card-opacity: 0.9;
      --sidebar-opacity: 0.9;
      --modal-opacity: 0.9;
      --player-opacity: 0.9;
      --bg-blur: 0px;
      --bg-darkness: 0.6;
      --show-particles: 1;
      --show-glow-effect: 1;
      --show-glow-border: 1;
      
      --title-color: #00f5ff;
      --title-size: 28px;
      --subtitle-color: #8888aa;
      --subtitle-size: 14px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: 'Rajdhani', 'Microsoft YaHei', Arial, sans-serif;
      background: var(--dark-bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      opacity: var(--dust-opacity);
      background-image: 
        url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      mix-blend-mode: overlay;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9998;
      opacity: calc(var(--scratch-density) * 0.3);
      background-image: 
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 2px,
          rgba(0,0,0,0.03) 2px,
          rgba(0,0,0,0.03) 4px
        ),
        repeating-linear-gradient(
          -45deg,
          transparent,
          transparent 2px,
          rgba(255,255,255,0.02) 2px,
          rgba(255,255,255,0.02) 4px
        );
    }

    /* 赛博朋克动态背景 */
    .cyber-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
      background: var(--dark-bg);
    }

    .cyber-bg::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(var(--primary-03) 1px, transparent 1px),
        linear-gradient(90deg, var(--primary-03) 1px, transparent 1px);
      background-size: 50px 50px;
      opacity: 0.5;
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }

    .cyber-bg .glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      animation: orbFloat 15s ease-in-out infinite;
    }

    .cyber-bg .glow-orb.cyan {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, var(--glow-cyan) 0%, transparent 70%);
      top: 10%;
      left: 10%;
      animation-delay: 0s;
    }

    .cyber-bg .glow-orb.magenta {
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, var(--glow-magenta) 0%, transparent 70%);
      bottom: 20%;
      right: 15%;
      animation-delay: -5s;
    }

    .cyber-bg .glow-orb.yellow {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, var(--glow-accent) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -10s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -30px) scale(1.1); }
      50% { transform: translate(-20px, 20px) scale(0.9); }
      75% { transform: translate(20px, 30px) scale(1.05); }
    }

    /* 扫描线效果 */
    .scanline {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.1),
        rgba(0, 0, 0, 0.1) 1px,
        transparent 1px,
        transparent 2px
      );
      pointer-events: none;
      z-index: 1000;
    }

    /* 动态光线 */
    .light-beam {
      position: fixed;
      width: 2px;
      height: 100px;
      background: linear-gradient(to bottom, transparent, var(--neon-cyan), transparent);
      opacity: 0.5;
      animation: beamFall 8s linear infinite;
      pointer-events: none;
      z-index: -1;
    }

    .light-beam:nth-child(1) { left: 10%; animation-delay: 0s; }
    .light-beam:nth-child(2) { left: 30%; animation-delay: 2s; }
    .light-beam:nth-child(3) { left: 50%; animation-delay: 4s; }
    .light-beam:nth-child(4) { left: 70%; animation-delay: 6s; }
    .light-beam:nth-child(5) { left: 90%; animation-delay: 1s; }

    @keyframes beamFall {
      0% { top: -100px; opacity: 0; }
      10% { opacity: 0.5; }
      90% { opacity: 0.5; }
      100% { top: 100%; opacity: 0; }
    }

    .app {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      position: relative;
      animation: fadeIn 0.8s ease-out;
      z-index: 1;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .radio-player {
      position: relative;
      padding: 30px;
      background: rgba(26, 26, 37, var(--card-opacity));
      border-radius: 20px;
      color: var(--text-primary);
      font-family: 'Orbitron', 'Courier New', monospace;
      box-shadow: 
        inset 0 1px 0 rgba(255,255,255,0.05),
        inset 0 -1px 0 rgba(0,0,0,0.2),
        0 4px 20px rgba(0,0,0,0.3);
      border: 1px solid var(--primary-3);
      overflow: hidden;
      opacity: var(--card-opacity);
    }

    .radio-player::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, 
        transparent, 
        rgba(255,255,255,calc(0.1 + var(--metal-shine) * 0.2)), 
        transparent
      );
      z-index: 2;
    }

    .radio-player::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      opacity: var(--wear-level);
      background-image: 
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='wear'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.02' numOctaves='3'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23wear)'/%3E%3C/svg%3E");
      mix-blend-mode: overlay;
      z-index: 1;
    }

    .radio-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      padding-bottom: 20px;
      border-bottom: 2px solid transparent;
      border-image: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta)) 1;
      position: relative;
      z-index: 1;
    }

    .radio-header h1 {
      font-size: 28px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: var(--neon-cyan);
      text-shadow: 
        0 0 10px var(--neon-cyan),
        0 0 20px var(--neon-cyan),
        0 0 40px var(--neon-cyan);
      animation: neonFlicker 3s ease-in-out infinite alternate;
    }

    @keyframes neonFlicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
        text-shadow: 
          0 0 10px var(--neon-cyan),
          0 0 20px var(--neon-cyan),
          0 0 40px var(--neon-cyan);
      }
      20%, 24%, 55% { text-shadow: none; }
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .header-btn {
      width: 42px;
      height: 42px;
      border: 2px solid var(--neon-magenta);
      border-radius: 50%;
      background: linear-gradient(135deg, var(--secondary-2), var(--primary-2));
      color: var(--neon-magenta);
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 15px var(--secondary-3);
      position: relative;
      overflow: hidden;
    }

    .header-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      opacity: var(--texture-intensity);
      pointer-events: none;
      background-image: 
        url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='leather'%3E%3CfeTurbulence type='turbulence' baseFrequency='0.8' numOctaves='3' result='noise'/%3E%3CfeDiffuseLighting in='noise' lighting-color='white' surfaceScale='2'%3E%3CfeDistantLight azimuth='45' elevation='60'/%3E%3C/feDiffuseLighting%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23leather)'/%3E%3C/svg%3E");
      mix-blend-mode: overlay;
      border-radius: 50%;
    }

    .header-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: left 0.5s ease;
      border-radius: 50%;
    }

    .header-btn:hover {
      transform: scale(1.1);
      box-shadow: 
        inset 0 1px 0 rgba(255,255,255,0.3),
        inset 0 -1px 0 rgba(0,0,0,0.2),
        0 5px 20px rgba(255, 0, 255, 0.3),
        0 0 30px rgba(0, 245, 255, 0.2);
    }

    .header-btn:hover::after {
      left: 100%;
    }

    /* LIVE新闻 */
    .live-news-container {
      margin-bottom: 25px;
      padding: 15px 20px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      border: 1px solid rgba(0, 245, 255, 0.2);
      overflow: hidden;
      position: relative;
      z-index: 1;
      box-shadow: 
        inset 0 1px 0 rgba(255,255,255,0.05),
        inset 0 -1px 0 rgba(0,0,0,0.2);
    }

    .live-news-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, 
        transparent, 
        rgba(255,255,255,calc(0.1 + var(--metal-shine) * 0.2)), 
        transparent
      );
    }

    .live-news-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .live-badge {
      background: var(--neon-red);
      color: white;
      font-size: 10px;
      font-weight: bold;
      padding: 3px 8px;
      border-radius: 3px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .live-news-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--neon-cyan);
      text-shadow: 0 0 10px var(--neon-cyan);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .live-news-scroll {
      height: 36px;
      overflow: hidden;
      position: relative;
    }

    .ticker-content {
      display: flex;
      animation: scroll 30s linear infinite;
    }

    .ticker-content:hover { animation-play-state: paused; }

    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .ticker-item {
      white-space: nowrap;
      padding: 0 25px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .ticker-item .time {
      color: var(--neon-cyan);
      margin-right: 8px;
    }

    /* 节目单标签 */
    .tabs {
      display: flex;
      gap: 5px;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 10px;
      position: relative;
      z-index: 1;
    }

    .tab {
      flex: 1;
      padding: 10px 20px;
      background: rgba(0, 0, 0, var(--card-opacity));
      border: none;
      color: var(--text-secondary);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .tab:hover {
      color: var(--text-primary);
    }

    .tab.active {
      background: rgba(0, 245, 255, 0.1);
      color: var(--neon-cyan);
    }

    /* 当前播放区域 - 始终显示 */
    .now-playing {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      padding: 20px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 15px;
      border: 1px solid rgba(0, 245, 255, 0.2);
      position: relative;
      overflow: hidden;
      z-index: 1;
      box-shadow: 
        inset 0 1px 0 rgba(255,255,255,0.05),
        inset 0 -1px 0 rgba(0,0,0,0.2);
    }

    .now-playing::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, 
        transparent, 
        rgba(255,255,255,calc(0.1 + var(--metal-shine) * 0.2)), 
        transparent
      );
      z-index: 2;
    }

    .now-playing::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, var(--primary-1), transparent);
      animation: scanLine 3s linear infinite;
    }

    @keyframes scanLine {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    .content-image {
      width: 120px;
      height: 120px;
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
      border: 2px solid var(--neon-cyan);
      box-shadow: 
        0 0 20px var(--primary-4),
        inset 0 0 20px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    .content-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: contrast(1.1) saturate(1.1);
    }

    .content-details {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .content-details h2 {
      margin: 0 0 8px 0;
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    }

    .content-details p {
      margin: 0 0 10px 0;
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.4;
    }

    .content-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag {
      background: linear-gradient(135deg, var(--primary-2), var(--secondary-2));
      color: var(--neon-cyan);
      padding: 4px 12px;
      border-radius: 15px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid var(--neon-cyan);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* 播放控制 */
    .player-controls {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
      padding: 18px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      border: 1px solid rgba(0, 245, 255, 0.2);
      position: relative;
      z-index: 1;
      opacity: var(--player-opacity);
      box-shadow: 
        inset 0 1px 0 rgba(255,255,255,0.05),
        inset 0 -1px 0 rgba(0,0,0,0.2);
    }

    .player-controls::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, 
        transparent, 
        rgba(255,255,255,calc(0.1 + var(--metal-shine) * 0.2)), 
        transparent
      );
    }

    .player-controls::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      opacity: var(--wear-level);
      background-image: 
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='wear'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.02' numOctaves='3'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23wear)'/%3E%3C/svg%3E");
      mix-blend-mode: overlay;
      border-radius: 12px;
    }

    .play-pause-btn {
      width: 50px;
      height: 50px;
      border: 2px solid var(--neon-cyan);
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-2), var(--secondary-2));
      color: var(--neon-cyan);
      font-size: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 
        inset 0 1px 0 rgba(255,255,255,0.2),
        inset 0 -1px 0 rgba(0,0,0,0.2),
        0 2px 10px rgba(0, 245, 255, 0.2);
      text-shadow: 0 0 10px var(--neon-cyan);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      position: relative;
      overflow: hidden;
    }

    .play-pause-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      opacity: var(--texture-intensity);
      pointer-events: none;
      background-image: 
        url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='leather'%3E%3CfeTurbulence type='turbulence' baseFrequency='0.8' numOctaves='3' result='noise'/%3E%3CfeDiffuseLighting in='noise' lighting-color='white' surfaceScale='2'%3E%3CfeDistantLight azimuth='45' elevation='60'/%3E%3C/feDiffuseLighting%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23leather)'/%3E%3C/svg%3E");
      mix-blend-mode: overlay;
      border-radius: 50%;
    }

    .play-pause-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: left 0.5s ease;
      border-radius: 50%;
    }

    .play-pause-btn:hover {
      transform: translateY(-2px);
      box-shadow: 
        inset 0 1px 0 rgba(255,255,255,0.3),
        inset 0 -1px 0 rgba(0,0,0,0.2),
        0 5px 20px rgba(0, 245, 255, 0.3),
        0 0 30px rgba(255, 0, 255, 0.2);
    }

    .play-pause-btn:hover::after {
      left: 100%;
    }

    .progress-bar {
      flex: 1;
      height: 8px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid rgba(0, 245, 255, 0.2);
      position: relative;
      min-width: 180px;
    }

    .progress-filled {
      height: 100%;
      background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
      border-radius: 4px;
      transition: width 0.1s ease;
      box-shadow: 0 0 10px rgba(0, 245, 255, 0.3);

    .progress-filled::after {

      height: 12px;

      height: 12px;

    .audio-visualizer.active .waveform span:nth-child(4) { animation-delay: 0.3s; }
    .audio-visualizer.active .waveform span:nth-child(5) { animation-delay: 0.4s; }
    .audio-visualizer.active .waveform span:nth-child(6) { animation-delay: 0.5s; }
    .audio-visualizer.active .waveform span:nth-child(7) { animation-delay: 0.6s; }
    .audio-visualizer.active .waveform span:nth-child(8) { animation-delay: 0.7s; }

    @keyframes waveform {

    .volume-control input[type="range"]::-webkit-slider-thumb {

      mix-blend-mode: overlay;
      border-radius: 50%;

      content: '';

    .play-btn:hover {

        0 0 30px rgba(255, 0, 255, 0.2);

    .play-btn:hover::after {
      left: 100%;

    /* 空状态 */

      padding: 50px 20px;
      color: var(--text-secondary);

    .empty-state .icon {

      margin-bottom: 15px;
    }

    .empty-state h3 {
      font-size: 16px;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

      font-size: 13px;

    /* 模态框 */

      justify-content: center;

      backdrop-filter: blur(3px);
    }

    .modal-overlay.hidden { display: none; }

    .modal-content {

      border: 1px solid rgba(0, 245, 255, 0.2);

      max-width: 420px;
      width: 90%;
      box-shadow: 
        inset 0 1px 0 rgba(255,255,255,0.05),
        inset 0 -1px 0 rgba(0,0,0,0.2),

      animation: modalIn 0.3s ease;
      opacity: var(--modal-opacity);

      overflow: hidden;
    }

    .modal-content::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, 
        transparent, 
        rgba(255,255,255,calc(0.1 + var(--metal-shine) * 0.2)), 
        transparent
      );

      from { opacity: 0; transform: scale(0.9); }

      background: linear-gradient(90deg, var(--neon-cyan), transparent);

    .modal-header h3 {
      margin: 0;

    .audio-item {

  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">

  <!-- 即时插播浮窗 -->
  <div id="instant-broadcast-widget" class="instant-widget hidden">
    <div class="instant-widget-header">
      <span>⚡ 即时插播</span>
      <button class="instant-close" onclick="toggleInstantWidget()">&times;</button>
    </div>
    <div class="instant-widget-body">
      <textarea id="instant-input" class="instant-input" placeholder="输入要插播的信息..."></textarea>
      <div id="instant-status" class="instant-status hidden"></div>
      <button class="instant-submit" onclick="submitInstantBroadcast()">确认插播</button>
    </div>
  </div>
  
  <!-- 即时插播触发按钮 -->
  <div id="instant-trigger" class="instant-trigger hidden" onclick="toggleInstantWidget()">
    <span>⚡</span>
  </div>

  <script>
    const API_BASE = 'http://localhost:3001/api';
    const FAVORITES_KEY = 'radio_v2_favorites';
    const HISTORY_KEY = 'radio_v2_history';

    const DEFAULT_COVER = 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=cyberpunk%20city%20night%20neon%20lights&image_size=square';

    let config = null;
    let favorites = loadFavorites();
    let history = loadHistory();
    let currentSchedule = null;
    let currentProgram = null;
    let currentAudioIndex = 0;
    let currentView = 'programs';

    const audioPlayer = document.getElementById('audio-player');

    async function loadConfig() {
      try {
        const response = await fetch(`${API_BASE}/config`);
        if (response.ok) {
          const data = await response.json();
          console.log('加载配置成功:', data.currentSkin, data.skins ? Object.keys(data.skins) : 'no skins');
          return data;
        }
      } catch (e) { console.error('从API加载配置失败:', e); }
      return { schedules: [], programs: [], liveNews: [], images: [], workflows: [], workflowRuns: [], currentSkin: 'cyberpunk', skins: {} };
    }

    function loadFavorites() {
      try {
        const stored = localStorage.getItem(FAVORITES_KEY);
        if (stored) return JSON.parse(stored);
      } catch (e) {}
      return [];
    }

    function loadHistory() {
      try {
        const stored = localStorage.getItem(HISTORY_KEY);
        if (stored) return JSON.parse(stored);
      } catch (e) {}
      return [];
    }

    function saveFavorites() { localStorage.setItem(FAVORITES_KEY, JSON.stringify(favorites)); }
    function saveHistory() { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); }

    function hasConfig() { return config && (config.schedules.length > 0 || config.programs.length > 0); }

    function hexToRgb(hex) {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : '0, 245, 255';
    }

    async function initApp() {
      config = await loadConfig();
      applyCurrentSkin();
      renderApp();
      initInstantBroadcast();
    }

    // ==================== 即时插播功能 ====================
    let savedPlaybackState = null;
    let instantBroadcastConfig = null;

    function initInstantBroadcast() {
      instantBroadcastConfig = config.instantBroadcast || { enabled: false, mode: 'fixed', fixedAudioUrl: '' };
      
      const trigger = document.getElementById('instant-trigger');
      if (instantBroadcastConfig.enabled) {
        trigger.classList.remove('hidden');
      } else {
        trigger.classList.add('hidden');
        document.getElementById('instant-broadcast-widget').classList.add('hidden');
      }
    }

    function toggleInstantWidget() {
      const widget = document.getElementById('instant-broadcast-widget');
      const trigger = document.getElementById('instant-trigger');
      
      if (widget.classList.contains('hidden')) {
        widget.classList.remove('hidden');
        trigger.classList.add('hidden');
        document.getElementById('instant-input').focus();
      } else {
        widget.classList.add('hidden');
        if (instantBroadcastConfig?.enabled) {
          trigger.classList.remove('hidden');
        }
      }
    }

    async function submitInstantBroadcast() {
      const input = document.getElementById('instant-input').value.trim();
      if (!input) {
        alert('请输入要插播的信息');
        return;
      }

      const submitBtn = document.querySelector('.instant-submit');
      const statusEl = document.getElementById('instant-status');
      submitBtn.disabled = true;
      submitBtn.textContent = '处理中...';
      if (statusEl) {
        statusEl.textContent = '正在连接工作流...';
        statusEl.classList.remove('hidden');
      }

      try {
        await performInstantBroadcast(input);
        
        document.getElementById('instant-input').value = '';
        if (statusEl) statusEl.classList.add('hidden');
        toggleInstantWidget();
      } catch (e) {
        console.error('即时插播失败:', e);
        if (statusEl) {
          statusEl.textContent = '错误: ' + e.message;
          statusEl.style.color = 'var(--neon-magenta, #ff00ff)';
        } else {
          alert('插播失败: ' + e.message);
        }
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '确认插播';
      }
    }

    async function performInstantBroadcast(userInput) {
      const mode = instantBroadcastConfig?.mode || 'fixed';
      const interruptMode = instantBroadcastConfig?.interruptMode || 'immediate';
      const preDelay = instantBroadcastConfig?.preDelay || 1000;
      let audioUrl = null;

      if (mode === 'fixed') {
        audioUrl = instantBroadcastConfig.fixedAudioUrl;
        if (!audioUrl) {
          throw new Error('未配置固定音频');
        }
      } else if (mode === 'workflow') {
        const workflowId = instantBroadcastConfig.workflowId;
        if (!workflowId) {
          throw new Error('未配置工作流');
        }
        
        const workflow = config.workflows?.find(w => w.id === workflowId);
        if (!workflow) {
          throw new Error('工作流不存在');
        }

        const submitBtn = document.querySelector('.instant-submit');
        const statusEl = document.getElementById('instant-status');
        if (submitBtn) submitBtn.textContent = '正在生成插播内容...';
        
        const inputKeys = Object.keys(workflow.inputTemplate || {});
        const inputKey = inputKeys.length > 0 ? inputKeys[0] : 'input';
        
        try {
          const response = await fetch(`${API_BASE}/workflows/${workflowId}/run`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ [inputKey]: userInput })
          });
          
          if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            throw new Error(errData.error || '工作流执行失败');
          }
          
          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let audioData = null;
          let buffer = '';
          
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';
            
            for (const line of lines) {
              if (!line || !line.startsWith('data:')) continue;
              let payload = line.slice(5).trim();
              if (!payload) continue;
              
              try {
                const data = JSON.parse(payload);
                
                if (data.event === 'node_started') {
                  if (statusEl) statusEl.textContent = `开始执行: ${data.title || data.node || '未知节点'}`;
                } else if (data.event === 'node_finished') {
                  if (statusEl) statusEl.textContent = `完成: ${data.title || data.node || '未知节点'}`;
                } else if (data.event === 'processing') {
                  if (statusEl) statusEl.textContent = data.message || '处理中...';
                } else if (data.event === 'finished') {
                  audioData = data;
                } else if (data.event) {
                  if (statusEl) statusEl.textContent = data.message || `事件: ${data.event}`;
                }
              } catch (e) {}
            }
          }
          
          if (!audioData || !audioData.audioUrl) {
            throw new Error('工作流未返回音频');
          }
          
          audioUrl = audioData.audioUrl;
          
          if (statusEl) statusEl.textContent = '生成完成！准备播放...';
          
          config = await loadConfig();
        } catch (e) {
          if (statusEl) {
            statusEl.textContent = '错误: ' + e.message;
            statusEl.style.color = 'var(--neon-magenta, #ff00ff)';
          }
          throw e;
        }
      }

      if (!audioUrl) {
        throw new Error('无法获取插播音频');
      }

      await playInstantBroadcast(audioUrl, userInput, interruptMode, preDelay);
    }

    async function playInstantBroadcast(audioUrl, userInput, interruptMode, preDelay) {
      if (interruptMode === 'waitFinish' && !audioPlayer.paused && currentProgram) {
        savedPlaybackState = {
          program: currentProgram,
          audioIndex: currentAudioIndex,
          currentTime: 0,
          wasPlaying: true,
          isWaitFinish: true
        };
        
        await new Promise(resolve => {
          const onEnded = () => {
            audioPlayer.removeEventListener('ended', onEnded);
            resolve();
          };
          audioPlayer.addEventListener('ended', onEnded);
        });
      } else {
        savedPlaybackState = {
          program: currentProgram,
          audioIndex: currentAudioIndex,
          currentTime: audioPlayer.currentTime,
          wasPlaying: !audioPlayer.paused,
          isWaitFinish: false
        };

        if (preDelay > 0) {
          await new Promise(resolve => setTimeout(resolve, preDelay));
        }

        audioPlayer.pause();
      }

      currentProgram = {
        id: 'instant-broadcast',
        title: '⚡ 即时插播',
        type: 'instant',
        audios: [{
          id: 'instant-audio',
          name: userInput.substring(0, 20) + (userInput.length > 20 ? '...' : ''),
          audioUrl: audioUrl
        }],
        imageUrl: instantBroadcastConfig?.imageUrl || DEFAULT_COVER,
        tags: ['即时插播']
      };
      currentAudioIndex = 0;

      audioPlayer.src = audioUrl;
      await audioPlayer.play();
      
      updateNowPlaying();
      renderContent();
    }

    async function resumeFromInstantBroadcast() {
      const postDelay = instantBroadcastConfig?.postDelay || 1000;
      
      if (postDelay > 0) {
        await new Promise(resolve => setTimeout(resolve, postDelay));
      }

      if (!savedPlaybackState) {
        document.getElementById('btn-play').textContent = '▶';
        document.getElementById('audio-visualizer').classList.remove('active');
        return;
      }

      const { program, audioIndex, currentTime, wasPlaying, isWaitFinish } = savedPlaybackState;
      savedPlaybackState = null;

      if (program && program.audios && program.audios.length > 0 && program.type !== 'broadcast' && program.type !== 'instant') {
        currentProgram = program;
        
        let nextIndex = audioIndex;
        let seekTime = currentTime;
        
        if (isWaitFinish) {
          nextIndex = audioIndex + 1;
          seekTime = 0;
          
          if (nextIndex >= program.audios.length) {
            currentProgram = null;
            updateNowPlaying();
            document.getElementById('btn-play').textContent = '▶';
            document.getElementById('audio-visualizer').classList.remove('active');
            renderContent();
            return;
          }
        }
        
        currentAudioIndex = nextIndex;
        audioPlayer.src = program.audios[nextIndex].audioUrl;
        audioPlayer.currentTime = seekTime;
        
        if (wasPlaying) {
          audioPlayer.play().catch(e => console.log('续播失败:', e));
        }
        
        updateNowPlaying();
        renderContent();
      } else {
        currentProgram = null;
        updateNowPlaying();
        document.getElementById('btn-play').textContent = '▶';
        document.getElementById('audio-visualizer').classList.remove('active');
      }
    }

    function applyCurrentSkin() {
      const currentSkinId = config.currentSkin || 'cyberpunk';
      const skins = config.skins;
      const skin = skins ? skins[currentSkinId] : null;
      
      console.log('applyCurrentSkin called:', currentSkinId, skin ? 'skin found' : 'skin not found');
      console.log('Available skins:', skins ? Object.keys(skins) : 'no skins in config');
      
      if (!skin) {
        console.log('Skin not found, using default colors');
        return;
      }
      
      const root = document.documentElement;
      
      if (skin.colors) {
        console.log('Applying colors:', skin.colors);
        root.style.setProperty('--neon-cyan', skin.colors.primary || '#00f5ff');
        root.style.setProperty('--neon-magenta', skin.colors.secondary || '#ff00ff');
        root.style.setProperty('--neon-orange', skin.colors.accent || '#ff6600');
        root.style.setProperty('--neon-green', skin.colors.success || '#00ff41');
        root.style.setProperty('--neon-yellow', skin.colors.warning || '#ffff00');
        root.style.setProperty('--neon-red', skin.colors.danger || '#ff0040');
        root.style.setProperty('--dark-bg', skin.colors.background || '#0a0a0f');
        root.style.setProperty('--dark-surface', skin.colors.surface || '#12121a');
        root.style.setProperty('--dark-card', skin.colors.card || '#1a1a25');
        root.style.setProperty('--text-primary', skin.colors.text || '#ffffff');
        root.style.setProperty('--text-secondary', skin.colors.textSecondary || '#8888aa');
        
        const primaryRgb = hexToRgb(skin.colors.primary || '#00f5ff');
        const secondaryRgb = hexToRgb(skin.colors.secondary || '#ff00ff');
        
        root.style.setProperty('--primary-rgb', primaryRgb);
        root.style.setProperty('--secondary-rgb', secondaryRgb);
        
        root.style.setProperty('--primary-03', `rgba(${primaryRgb}, 0.03)`);
        root.style.setProperty('--primary-05', `rgba(${primaryRgb}, 0.05)`);
        root.style.setProperty('--primary-08', `rgba(${primaryRgb}, 0.08)`);
        root.style.setProperty('--primary-1', `rgba(${primaryRgb}, 0.1)`);
        root.style.setProperty('--primary-12', `rgba(${primaryRgb}, 0.12)`);
        root.style.setProperty('--primary-15', `rgba(${primaryRgb}, 0.15)`);
        root.style.setProperty('--primary-2', `rgba(${primaryRgb}, 0.2)`);
        root.style.setProperty('--primary-3', `rgba(${primaryRgb}, 0.3)`);
        root.style.setProperty('--primary-4', `rgba(${primaryRgb}, 0.4)`);
        root.style.setProperty('--primary-5', `rgba(${primaryRgb}, 0.5)`);
        
        root.style.setProperty('--secondary-03', `rgba(${secondaryRgb}, 0.03)`);
        root.style.setProperty('--secondary-05', `rgba(${secondaryRgb}, 0.05)`);
        root.style.setProperty('--secondary-08', `rgba(${secondaryRgb}, 0.08)`);
        root.style.setProperty('--secondary-1', `rgba(${secondaryRgb}, 0.1)`);
        root.style.setProperty('--secondary-12', `rgba(${secondaryRgb}, 0.12)`);
        root.style.setProperty('--secondary-15', `rgba(${secondaryRgb}, 0.15)`);
        root.style.setProperty('--secondary-2', `rgba(${secondaryRgb}, 0.2)`);
        root.style.setProperty('--secondary-3', `rgba(${secondaryRgb}, 0.3)`);
        
        root.style.setProperty('--glow-cyan', `rgba(${primaryRgb}, 0.3)`);
        root.style.setProperty('--glow-magenta', `rgba(${secondaryRgb}, 0.25)`);
        root.style.setProperty('--glow-accent', `rgba(${hexToRgb(skin.colors.accent || '#ff6600')}, 0.15)`);
      }
      
      if (skin.fonts) {
        root.style.setProperty('--font-title', skin.fonts.title || "'Orbitron', monospace");
        root.style.setProperty('--font-body', skin.fonts.body || "'Rajdhani', sans-serif");
      }
      
      // 应用纹理效果参数
      const effects = skin.effects || {};
      console.log('Applying effects:', effects);
      root.style.setProperty('--texture-intensity', effects.textureIntensity || 0);
      root.style.setProperty('--wear-level', effects.wearLevel || 0);
      root.style.setProperty('--metal-shine', effects.metalShine || 0);
      root.style.setProperty('--dust-opacity', effects.dustOpacity || 0);
      root.style.setProperty('--scratch-density', effects.scratchDensity || 0);
      
      // 应用透明度参数
      const opacity = skin.opacity || {};
      root.style.setProperty('--card-opacity', opacity.card || 0.95);
      root.style.setProperty('--sidebar-opacity', opacity.sidebar || 0.98);
      root.style.setProperty('--modal-opacity', opacity.modal || 0.95);
      root.style.setProperty('--player-opacity', opacity.player || 0.9);
      
      // 应用背景效果参数
      const bg = skin.background || {};
      root.style.setProperty('--bg-blur', (bg.blur || 5) + 'px');
      root.style.setProperty('--bg-darkness', bg.darkness || 0.3);
      
      // 应用装饰效果开关
      const decorations = skin.decorations || {};
      root.style.setProperty('--show-particles', decorations.particles !== false ? '1' : '0');
      root.style.setProperty('--show-glow-effect', decorations.glowEffect !== false ? '1' : '0');
      root.style.setProperty('--show-glow-border', decorations.glowBorder !== false ? '1' : '0');
      
      // 应用文本配置
      const text = skin.text || {};
      root.style.setProperty('--title-color', text.titleColor || skin.colors?.primary || '#00f5ff');
      root.style.setProperty('--title-size', (text.titleSize || 28) + 'px');
      root.style.setProperty('--subtitle-color', text.subtitleColor || skin.colors?.textSecondary || '#8888aa');
      root.style.setProperty('--subtitle-size', (text.subtitleSize || 14) + 'px');
      
      // 更新标题文本
      const mainTitle = document.querySelector('.radio-title');
      const mainTitleEn = document.querySelector('.radio-title-en');
      const subTitle = document.querySelector('.radio-subtitle');
      const subTitleEn = document.querySelector('.radio-subtitle-en');
      
      if (mainTitle) mainTitle.textContent = '📻 ' + (text.mainTitle || '赛博电台');
      if (mainTitleEn) mainTitleEn.textContent = text.mainTitleEn || 'CYBER RADIO';
      if (subTitle) subTitle.textContent = text.subTitle || '赛博朋克风格电台';
      if (subTitleEn) subTitleEn.textContent = text.subTitleEn || 'Cyberpunk Style Radio';
      
      // 应用背景图片
      if (bg.image) {
        const cyberBg = document.querySelector('.cyber-bg');
        if (cyberBg) {
          cyberBg.style.backgroundImage = `url(${bg.image})`;
          cyberBg.style.backgroundSize = 'cover';
          cyberBg.style.backgroundAttachment = 'fixed';
          cyberBg.style.filter = 'none';
        }
      } else {
        const cyberBg = document.querySelector('.cyber-bg');
        if (cyberBg) {
          cyberBg.style.backgroundImage = 'none';
          cyberBg.style.background = `var(--dark-bg)`;
          cyberBg.style.filter = 'none';
        }
      }
      
      // 应用装饰图片
      applyDecorationImages(skin.decorations?.images || []);
    }
    
    function applyDecorationImages(images) {
      // 移除现有装饰图片
      document.querySelectorAll('.decoration-image').forEach(el => el.remove());
      
      // 添加新装饰图片
      images.forEach((img, index) => {
        if (!img.url) return;
        
        const el = document.createElement('div');
        el.className = 'decoration-image';
        el.style.cssText = `
          position: fixed;
          pointer-events: none;
          z-index: 0;
          background-image: url(${img.url});
          background-size: contain;
          background-repeat: no-repeat;
          opacity: ${img.opacity || 0.8};
        `;
        
        // 根据位置设置样式
        const size = img.size || 'medium';
        const sizeMap = { small: '100px', medium: '150px', large: '200px' };
        el.style.width = sizeMap[size] || '150px';
        el.style.height = sizeMap[size] || '150px';
        
        const position = img.position || 'bottom-right';
        const positionMap = {
          'top-left': { top: '20px', left: '20px' },
          'top-right': { top: '20px', right: '20px' },
          'top-center': { top: '20px', left: '50%', transform: 'translateX(-50%)' },
          'bottom-left': { bottom: '20px', left: '20px' },
          'bottom-right': { bottom: '20px', right: '20px' },
          'bottom-center': { bottom: '20px', left: '50%', transform: 'translateX(-50%)' },
          'left-center': { top: '50%', left: '20px', transform: 'translateY(-50%)' },
          'right-center': { top: '50%', right: '20px', transform: 'translateY(-50%)' },
          'center': { top: '50%', left: '50%', transform: 'translate(-50%, -50%)' }
        };
        
        Object.assign(el.style, positionMap[position] || positionMap['bottom-right']);
        
        document.body.appendChild(el);
      });
    }

    function renderApp() {
      renderLiveTicker();
      renderScheduleTabs();
      renderContent();
    }

    function renderLiveTicker() {
      const container = document.getElementById('ticker-content');
      const newsContainer = document.getElementById('live-news-container');
      
      if (!config.liveNews || config.liveNews.length === 0) {
        newsContainer.classList.add('hidden');
        return;
      }
      
      newsContainer.classList.remove('hidden');
      const newsHtml = config.liveNews.map(n => 
        `<span class="ticker-item"><span class="time">${n.time}</span>${n.content}</span>`
      ).join('');
      container.innerHTML = newsHtml + newsHtml;
    }

    function renderScheduleTabs() {
      const container = document.getElementById('schedule-tabs');
      
      if (!config.schedules || config.schedules.length === 0) {
        container.innerHTML = '';
        return;
      }

      if (!currentSchedule && config.schedules.length > 0) {
        currentSchedule = config.schedules[0].id;
      }

      container.innerHTML = config.schedules.map(s => `
        <div class="tab ${s.id === currentSchedule ? 'active' : ''}" data-schedule="${s.id}">
          ${s.name}
        </div>
      `).join('');

      container.querySelectorAll('.tab').forEach(tab => {
        tab.onclick = () => {
          currentSchedule = tab.dataset.schedule;
          renderScheduleTabs();
          renderContent();
        };
      });
    }

    function renderContent() {
      const container = document.getElementById('content-list');

      if (!hasConfig()) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">📻</div>
            <h3>暂无节目内容</h3>
            <p>请先在后台管理系统中配置节目单和节目内容</p>
          </div>
        `;
        return;
      }

      if (currentView === 'programs') {
        renderProgramsList(container);
      } else if (currentView === 'favorites') {
        renderFavorites(container);
      } else if (currentView === 'history') {
        renderHistory(container);
      }
    }

    function renderProgramsList(container) {
      if (!currentSchedule) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">📋</div>
            <h3>暂无节目单</h3>
            <p>请先在后台创建节目单</p>
          </div>
        `;
        return;
      }

      const schedule = config.schedules.find(s => s.id === currentSchedule);
      if (!schedule || !schedule.programs || schedule.programs.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">🎵</div>
            <h3>节目单暂无节目</h3>
            <p>请在后台为节目单添加节目</p>
          </div>
        `;
        return;
      }

      const programs = schedule.programs
        .map(pid => config.programs.find(p => p.id === pid))
        .filter(p => p && p.status === 'published');

      if (programs.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">🎵</div>
            <h3>暂无已发布的节目</h3>
            <p>请在后台发布节目</p>
          </div>
        `;
        return;
      }

      container.innerHTML = programs.map(p => renderContentItem(p)).join('');
    }

    function renderContentItem(program) {
      const isFavorite = favorites.includes(program.id);
      const isActive = currentProgram && currentProgram.id === program.id;
      const hasAudio = program.audios && program.audios.length > 0;
      const typeLabels = { news: '新闻', interview: '访谈', music: '音乐' };
      const imageUrl = program.imageUrl || DEFAULT_COVER;

      return `
        <div class="content-item ${isActive ? 'active' : ''}" data-program="${program.id}">
          <div class="content-item-image">
            <img src="${imageUrl}" alt="${program.title}">
          </div>
          <div class="content-info" onclick="playProgram('${program.id}')">
            <h4>${program.title}</h4>
            <p>${program.description || '暂无描述'}</p>
            <div class="content-meta">
              <span class="content-type ${program.type}">${typeLabels[program.type] || program.type}</span>
              <span class="content-duration">${hasAudio ? program.audios.length + '个音频' : '暂无音频'}</span>
            </div>
          </div>
          <div class="content-actions">
            <button class="favorite-btn ${isFavorite ? 'favorited' : ''}" onclick="toggleFavorite(event, '${program.id}')" title="${isFavorite ? '取消收藏' : '收藏'}">
              ${isFavorite ? '❤️' : '🤍'}
            </button>
            <button class="play-btn" onclick="togglePlayProgram('${program.id}')" title="${isActive ? '暂停' : '播放'}">
              ${isActive && !audioPlayer.paused ? '⏸' : '▶'}
            </button>
          </div>
        </div>
      `;
    }

    function renderFavorites(container) {
      const favoritePrograms = favorites
        .map(id => config.programs.find(p => p.id === id))
        .filter(p => p && p.status === 'published');

      if (favoritePrograms.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">❤️</div>
            <h3>暂无收藏</h3>
            <p>点击节目列表中的爱心收藏喜欢的节目</p>
          </div>
        `;
        return;
      }

      container.innerHTML = favoritePrograms.map(p => renderContentItem(p)).join('');
    }

    function renderHistory(container) {
      if (history.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">📜</div>
            <h3>暂无播放历史</h3>
            <p>播放过的节目会在这里显示</p>
          </div>
        `;
        return;
      }

      const historyPrograms = history
        .slice(0, 20)
        .map(h => {
          const program = config.programs.find(p => p.id === h.programId);
          if (!program) return null;
          return { ...program, playedAt: h.playedAt };
        })
        .filter(Boolean);

      if (historyPrograms.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">📜</div>
            <h3>暂无播放历史</h3>
            <p>播放过的节目会在这里显示</p>
          </div>
        `;
        return;
      }

      container.innerHTML = historyPrograms.map(p => renderContentItem(p)).join('');
    }

    function toggleFavorite(event, programId) {
      event.stopPropagation();
      const idx = favorites.indexOf(programId);
      if (idx > -1) {
        favorites.splice(idx, 1);
      } else {
        favorites.push(programId);
      }
      saveFavorites();
      renderContent();
    }

    function togglePlayProgram(programId) {
      if (currentProgram && currentProgram.id === programId && !audioPlayer.paused) {
        audioPlayer.pause();
      } else {
        playProgram(programId);
      }
    }

    function playProgram(programId) {
      const program = config.programs.find(p => p.id === programId);
      if (!program) return;

      if (!program.audios || program.audios.length === 0) {
        showNoAudioModal(program);
        return;
      }

      currentProgram = program;
      currentAudioIndex = 0;

      addToHistory(programId);
      
      const broadcasts = getActiveBroadcastsForSchedule(currentSchedule);
      const schedule = config.schedules.find(s => s.id === currentSchedule);
      const isFirstProgram = schedule && schedule.programs[0] === programId;
      const isLastProgram = schedule && schedule.programs[schedule.programs.length - 1] === programId;
      
      let broadcastsToPlay = [];
      
      if (isFirstProgram) {
        broadcastsToPlay = broadcastsToPlay.concat(broadcasts.filter(b => b.position === 'before-all'));
      }
      
      broadcastsToPlay = broadcastsToPlay.concat(broadcasts.filter(b => b.position === 'before-program' && b.targetProgramId === programId));
      
      if (broadcastsToPlay.length > 0) {
        playBroadcastThenProgram(broadcastsToPlay, program, 0);
      } else {
        playAudio(0);
      }
      
      updateNowPlaying();
      renderContent();
    }

    function getActiveBroadcastsForSchedule(scheduleId) {
      if (!config.broadcasts || !scheduleId) return [];
      return config.broadcasts
        .filter(b => b.enabled && b.targetScheduleId === scheduleId)
        .sort((a, b) => a.priority - b.priority);
    }

    function playBroadcastThenProgram(broadcasts, program, audioIndex) {
      if (broadcasts.length === 0) {
        currentProgram = program;
        currentAudioIndex = audioIndex;
        playAudio(audioIndex);
        updateNowPlaying();
        return;
      }

      const broadcast = broadcasts[0];
      const remainingBroadcasts = broadcasts.slice(1);
      
      currentProgram = {
        id: 'broadcast-temp',
        title: `📢 ${broadcast.name}`,
        type: 'broadcast',
        audios: [{
          id: 'broadcast-audio',
          name: '插播',
          audioUrl: broadcast.audioUrl
        }],
        imageUrl: DEFAULT_COVER,
        tags: ['插播', '动态信息']
      };
      currentAudioIndex = 0;
      
      audioPlayer.src = broadcast.audioUrl;
      audioPlayer.play().catch(e => console.log('插播播放失败:', e));
      updateNowPlaying();
      renderContent();
      
      const originalOnEnded = audioPlayer.onended;
      audioPlayer.onended = () => {
        audioPlayer.onended = originalOnEnded;
        playBroadcastThenProgram(remainingBroadcasts, program, audioIndex);
      };
    }

    function showNoAudioModal(program) {
      showModal('暂无音频', `
        <div style="text-align: center;">
          <p style="font-size: 40px; margin-bottom: 12px;">🔇</p>
          <p style="margin-bottom: 15px; color: var(--text-secondary);">
            "${program.title}" 暂无音频内容<br>
            请在后台管理系统中为此节目添加音频
          </p>
        </div>
      `);
    }

    function playAudio(index) {
      if (!currentProgram || !currentProgram.audios || index >= currentProgram.audios.length) return;
      
      currentAudioIndex = index;
      const audio = currentProgram.audios[index];
      
      audioPlayer.src = audio.audioUrl;
      audioPlayer.play().catch(e => console.log('播放失败:', e));
      
      updateNowPlaying();
    }

    function updateNowPlaying() {
      const npImage = document.getElementById('np-image');
      const npTitle = document.getElementById('np-title');
      const npDesc = document.getElementById('np-desc');
      const npTags = document.getElementById('np-tags');

      if (!currentProgram) {
        npImage.src = DEFAULT_COVER;
        npTitle.textContent = '电台';
        npDesc.textContent = '选择一个节目开始收听';
        npTags.innerHTML = '<span class="tag">赛博朋克</span><span class="tag">电台</span>';
        return;
      }

      const audio = currentProgram.audios[currentAudioIndex];
      
      npImage.src = currentProgram.imageUrl || DEFAULT_COVER;
      npTitle.textContent = currentProgram.title;
      npDesc.textContent = audio ? audio.name : '-';
      
      if (currentProgram.tags && currentProgram.tags.length > 0) {
        npTags.innerHTML = currentProgram.tags.slice(0, 3).map(t => `<span class="tag">${t}</span>`).join('');
      } else {
        npTags.innerHTML = '<span class="tag">节目</span>';
      }
    }

    function addToHistory(programId) {
      history = history.filter(h => h.programId !== programId);
      history.unshift({ programId, playedAt: Date.now() });
      if (history.length > 50) history = history.slice(0, 50);
      saveHistory();
    }

    function showModal(title, content) {
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-body').innerHTML = content;
      document.getElementById('modal-overlay').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.add('hidden');
    }

    function showAudioListModal() {
      if (!currentProgram || !currentProgram.audios) return;

      showModal('音频列表', `
        <div class="audio-list">
          ${currentProgram.audios.map((audio, idx) => `
            <div class="audio-item ${idx === currentAudioIndex ? 'active' : ''}" onclick="playAudio(${idx}); closeModal();">
              <div class="play-icon">${idx === currentAudioIndex ? '⏸' : '▶'}</div>
              <div class="audio-details">
                <div class="audio-name">${audio.name}</div>
                <div class="audio-meta">${audio.source || '音频'} | ${audio.voiceStyle || '默认'}</div>
              </div>
            </div>
          `).join('')}
        </div>
      `);
    }

    document.getElementById('modal-close').onclick = closeModal;
    document.getElementById('modal-overlay').onclick = (e) => {
      if (e.target.id === 'modal-overlay') closeModal();
    };

    document.getElementById('btn-play').onclick = () => {
      if (audioPlayer.paused) {
        if (!currentProgram && config.schedules && config.schedules.length > 0) {
          const schedule = config.schedules[0];
          if (schedule.programs && schedule.programs.length > 0) {
            currentSchedule = schedule.id;
            playProgram(schedule.programs[0]);
            return;
          }
        }
        audioPlayer.play();
      } else {
        audioPlayer.pause();
      }
    };

    document.getElementById('btn-prev').onclick = () => {
      if (currentAudioIndex > 0) {
        playAudio(currentAudioIndex - 1);
      }
    };

    document.getElementById('btn-next').onclick = () => {
      if (currentProgram && currentAudioIndex < currentProgram.audios.length - 1) {
        playAudio(currentAudioIndex + 1);
      }
    };

    document.getElementById('np-title').onclick = showAudioListModal;
    document.getElementById('np-desc').onclick = showAudioListModal;

    document.getElementById('progress-bar').onclick = (e) => {
      const rect = e.target.getBoundingClientRect();
      const percent = (e.clientX - rect.left) / rect.width;
      audioPlayer.currentTime = percent * audioPlayer.duration;
    };

    document.getElementById('volume-slider').oninput = (e) => {
      audioPlayer.volume = e.target.value / 100;
    };

    audioPlayer.ontimeupdate = () => {
      const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100 || 0;
      document.getElementById('progress-filled').style.width = progress + '%';
      document.getElementById('time-current').textContent = formatAudioTime(audioPlayer.currentTime);
      document.getElementById('time-total').textContent = formatAudioTime(audioPlayer.duration);
    };

    audioPlayer.onended = async () => {
      if (currentProgram && (currentProgram.type === 'broadcast' || currentProgram.type === 'instant')) {
        if (currentProgram.type === 'instant') {
          await resumeFromInstantBroadcast();
        }
        return;
      }
      
      if (currentProgram && currentAudioIndex < currentProgram.audios.length - 1) {
        playAudio(currentAudioIndex + 1);
      } else {
        const broadcasts = getActiveBroadcastsForSchedule(currentSchedule);
        const schedule = config.schedules.find(s => s.id === currentSchedule);
        const currentProgramId = currentProgram?.id;
        const isLastProgram = schedule && schedule.programs[schedule.programs.length - 1] === currentProgramId;
        
        let afterBroadcasts = [];
        
        afterBroadcasts = afterBroadcasts.concat(broadcasts.filter(b => b.position === 'after-program' && b.targetProgramId === currentProgramId));
        
        if (isLastProgram) {
          afterBroadcasts = afterBroadcasts.concat(broadcasts.filter(b => b.position === 'after-all'));
        }
        
        if (afterBroadcasts.length > 0) {
          playAfterBroadcasts(afterBroadcasts);
        } else {
          document.getElementById('btn-play').textContent = '▶';
          document.getElementById('audio-visualizer').classList.remove('active');
        }
      }
    };

    function playAfterBroadcasts(broadcasts) {
      if (broadcasts.length === 0) {
        document.getElementById('btn-play').textContent = '▶';
        document.getElementById('audio-visualizer').classList.remove('active');
        currentProgram = null;
        updateNowPlaying();
        return;
      }

      const broadcast = broadcasts[0];
      const remainingBroadcasts = broadcasts.slice(1);
      
      currentProgram = {
        id: 'broadcast-temp',
        title: `📢 ${broadcast.name}`,
        type: 'broadcast',
        audios: [{
          id: 'broadcast-audio',
          name: '插播',
          audioUrl: broadcast.audioUrl
        }],
        imageUrl: DEFAULT_COVER,
        tags: ['插播', '动态信息']
      };
      currentAudioIndex = 0;
      
      audioPlayer.src = broadcast.audioUrl;
      audioPlayer.play().catch(e => console.log('插播播放失败:', e));
      updateNowPlaying();
      renderContent();
      
      audioPlayer.onended = () => {
        audioPlayer.onended = null;
        playAfterBroadcasts(remainingBroadcasts);
      };
    }

    audioPlayer.onplay = () => {
      document.getElementById('btn-play').textContent = '⏸';
      document.getElementById('audio-visualizer').classList.add('active');
      renderContent();
    };

    audioPlayer.onpause = () => {
      document.getElementById('btn-play').textContent = '▶';
      document.getElementById('audio-visualizer').classList.remove('active');
      renderContent();
    };

    function formatAudioTime(seconds) {
      if (isNaN(seconds)) return '0:00';
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    document.querySelectorAll('.nav-tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentView = tab.dataset.view;
        renderContent();
      };
    });

    document.getElementById('btn-favorites').onclick = () => {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      document.querySelector('.nav-tab[data-view="favorites"]').classList.add('active');
      currentView = 'favorites';
      renderContent();
    };

    document.getElementById('btn-history').onclick = () => {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      document.querySelector('.nav-tab[data-view="history"]').classList.add('active');
      currentView = 'history';
      renderContent();
    };

    audioPlayer.volume = 0.8;
    initApp();
  </script>
</body>
</html>
